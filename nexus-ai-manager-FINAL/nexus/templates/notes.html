{% extends "base.html" %}
{% block title %}Notes{% endblock %}
{% block page_title %}📝 Notes{% endblock %}
{% block topbar_actions %}
<button class="tb-btn" onclick="summarize()">🤖 AI Summarize</button>
<button class="tb-btn primary" onclick="newNote()">+ New Note</button>
{% endblock %}
{% block extra_head %}
<style>
.notes-layout{display:grid;grid-template-columns:280px 1fr;gap:16px;height:calc(100vh - 108px);}
.notes-list{overflow-y:auto;display:flex;flex-direction:column;gap:6px;}
.note-item{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:13px;cursor:pointer;transition:all .15s;}
.note-item:hover{border-color:var(--border2);}
.note-item.active{border-color:var(--accent);background:rgba(59,130,246,.06);}
.note-title-list{font-size:13px;font-weight:600;margin-bottom:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.note-preview{font-size:12px;color:var(--text2);line-height:1.4;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
.note-editor{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);display:flex;flex-direction:column;overflow:hidden;}
.note-editor-header{padding:14px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;}
.note-editor-title{flex:1;background:none;border:none;font-family:'Syne',sans-serif;font-size:20px;font-weight:700;color:var(--text);outline:none;}
.note-editor-body{flex:1;padding:20px;outline:none;font-size:14px;line-height:1.75;color:var(--text);overflow-y:auto;min-height:200px;}
.note-editor-body:empty::before{content:'Start writing... press / for commands ✨';color:var(--text3);}
</style>
{% endblock %}
{% block content %}
<div class="notes-layout">
  <div class="notes-list" id="notesList"></div>
  <div class="note-editor">
    <div class="note-editor-header">
      <input class="note-editor-title" id="noteTitleInp" placeholder="Note title..." oninput="saveNote()">
      <button class="btn btn-ghost btn-sm" onclick="summarize()">🤖 Summarize</button>
      <button class="btn btn-ghost btn-sm" onclick="deleteNote()" style="color:var(--a5);">🗑</button>
    </div>
    <div class="note-editor-body" id="noteBody" contenteditable="true" oninput="saveNote()"></div>
  </div>
</div>
{% endblock %}
{% block scripts %}
<script>
let notes = {{ notes|safe }};
let currentNote = null;
let saveTimeout = null;
function renderNotes(){
  const l=document.getElementById('notesList');
  l.innerHTML=notes.length?notes.map(n=>`<div class="note-item ${currentNote===n.id?'active':''}" onclick="selectNote('${n.id}')">
    ${n.pinned?'<span style="font-size:10px;color:var(--a4);">📌 PINNED</span><br>':''}
    <div class="note-title-list">${n.title||'Untitled'}</div>
    <div class="note-preview">${n.content||'No content'}</div>
    <div style="font-size:10px;color:var(--text3);margin-top:6px;">${new Date(n.updated_at).toLocaleDateString()}</div>
  </div>`).join(''):
  '<div style="font-size:13px;color:var(--text2);padding:12px;">No notes yet. Create your first one!</div>';
}
function selectNote(id){
  currentNote=id;const n=notes.find(n=>n.id===id);
  document.getElementById('noteTitleInp').value=n?.title||'';
  document.getElementById('noteBody').innerHTML=(n?.content||'').replace(/\n/g,'<br>');
  renderNotes();
}
async function newNote(){
  const r=await api('POST','/api/notes',{title:'',content:'',tags:[]});
  const n={id:r.id,title:'',content:'',tags:[],pinned:0,created_at:new Date().toISOString(),updated_at:new Date().toISOString()};
  notes.unshift(n);selectNote(n.id);renderNotes();
  document.getElementById('noteTitleInp').focus();
}
function saveNote(){
  if(!currentNote)return;
  clearTimeout(saveTimeout);
  saveTimeout=setTimeout(async()=>{
    const n=notes.find(n=>n.id===currentNote);if(!n)return;
    n.title=document.getElementById('noteTitleInp').value;
    n.content=document.getElementById('noteBody').innerText;
    n.updated_at=new Date().toISOString();
    await api('PUT',`/api/notes/${currentNote}`,{title:n.title,content:n.content,tags:n.tags||[]});
    renderNotes();
  },800);
}
async function deleteNote(){
  if(!currentNote)return;
  await api('DELETE',`/api/notes/${currentNote}`);
  notes=notes.filter(n=>n.id!==currentNote);currentNote=null;
  document.getElementById('noteTitleInp').value='';document.getElementById('noteBody').innerHTML='';
  renderNotes();toast('Note deleted','info');
}
async function summarize(){
  if(!currentNote){toast('Select a note first','error');return;}
  const n=notes.find(n=>n.id===currentNote);if(!n?.content){toast('Note is empty','error');return;}
  toast('🤖 Summarizing...','info');
  const r=await api('POST','/api/ai/chat',{message:`Summarize this note in 3 bullet points:\n${n.content}`});
  if(r.reply)alert('AI Summary:\n\n'+r.reply);
}
async function api(m,u,b){const r=await fetch(u,{method:m,headers:{'Content-Type':'application/json'},body:b?JSON.stringify(b):undefined});return r.json();}
function toast(msg,type){const icons={success:'✅',error:'❌',info:'💡'};const c=document.getElementById('toast-container');const t=document.createElement('div');t.className=`toast ${type}`;t.innerHTML=`<span style="font-size:16px">${icons[type]||'💡'}</span><span>${msg}</span>`;c.appendChild(t);setTimeout(()=>{t.classList.add('out');setTimeout(()=>t.remove(),300);},3500);}
renderNotes();if(notes.length)selectNote(notes[0].id);
</script>
{% endblock %}
