{% extends "base.html" %}
{% block title %}Goals{% endblock %}
{% block page_title %}🎯 Goals{% endblock %}
{% block topbar_actions %}
<button class="tb-btn" onclick="getInsights()">🤖 AI Insights</button>
<button class="tb-btn primary" onclick="openModal('goalModal')">+ New Goal</button>
{% endblock %}
{% block content %}
<div class="grid3" id="goalsGrid"></div>
<div class="modal-overlay" id="goalModal">
  <div class="modal"><div class="modal-title">New Goal</div><div class="modal-close" onclick="closeModal('goalModal')">✕</div>
    <div class="form-group"><label class="form-label">Title</label><input class="form-input" id="gTitle" placeholder="e.g. Run a 5K, Learn Python..."></div>
    <div class="form-group"><label class="form-label">Description</label><textarea class="form-textarea" id="gDesc" placeholder="Describe your goal..."></textarea></div>
    <div class="form-row">
      <div class="form-group"><label class="form-label">Category</label><select class="form-select" id="gCat"><option value="Career">💼 Career</option><option value="Health">🏃 Health</option><option value="Finance">💰 Finance</option><option value="Learning">📚 Learning</option><option value="Personal">⭐ Personal</option></select></div>
      <div class="form-group"><label class="form-label">Target Date</label><input class="form-input" id="gDate" type="date"></div>
    </div>
    <div class="modal-footer"><button class="btn btn-ghost" onclick="closeModal('goalModal')">Cancel</button><button class="btn btn-primary" onclick="addGoal()">Create Goal</button></div>
  </div>
</div>
{% endblock %}
{% block scripts %}
<script>
let goals = {{ goals|safe }};
const COLORS={Career:'#6366f1',Health:'#10b981',Finance:'#f59e0b',Learning:'#3b82f6',Personal:'#ec4899'};
const ICONS={Career:'💼',Health:'🏃',Finance:'💰',Learning:'📚',Personal:'⭐'};
function renderGoals(){
  const g=document.getElementById('goalsGrid');
  if(!goals.length){g.innerHTML='<div class="card" style="grid-column:1/-1"><div class="empty-state"><div class="empty-icon">🎯</div><p>No goals yet. Set your first one!</p></div></div>';return;}
  g.innerHTML=goals.map(gl=>{
    const daysLeft=Math.ceil((new Date(gl.target_date)-new Date())/86400000);
    return `<div class="card" style="cursor:pointer;">
      <div style="display:flex;align-items:center;gap:12px;margin-bottom:14px;">
        <div style="width:44px;height:44px;border-radius:12px;background:${gl.color}22;display:flex;align-items:center;justify-content:center;font-size:20px;">${gl.icon}</div>
        <div style="flex:1;"><div style="font-size:14px;font-weight:600;margin-bottom:2px;">${gl.title}</div><div style="font-size:11px;color:var(--text2);">📅 ${daysLeft>0?daysLeft+' days left':'Overdue'}</div></div>
        <span style="font-size:10px;font-weight:700;padding:3px 9px;border-radius:6px;background:${gl.color}22;color:${gl.color};">${gl.category}</span>
      </div>
      <div style="font-size:12px;color:var(--text2);margin-bottom:12px;line-height:1.5;">${gl.description||''}</div>
      <div class="progress-wrap mb-2"><div class="progress-fill" style="width:${gl.progress}%;background:${gl.color};"></div></div>
      <div style="display:flex;justify-content:space-between;font-size:12px;color:var(--text2);">
        <span>${gl.progress}% complete</span>
        <div style="display:flex;gap:8px;">
          <span style="cursor:pointer;color:var(--text2);" onclick="updateProgress('${gl.id}',-10)">-10%</span>
          <span style="cursor:pointer;color:${gl.color};font-weight:700;" onclick="updateProgress('${gl.id}',10)">+10%</span>
          <span style="cursor:pointer;color:var(--a5);" onclick="deleteGoal('${gl.id}')">✕</span>
        </div>
      </div>
    </div>`;
  }).join('');
}
async function addGoal(){
  const title=document.getElementById('gTitle').value.trim();if(!title){toast('Enter title','error');return;}
  const cat=document.getElementById('gCat').value;
  const r=await api('POST','/api/goals',{title,description:document.getElementById('gDesc').value,category:cat,icon:ICONS[cat]||'🎯',color:COLORS[cat]||'#3b82f6',target_date:document.getElementById('gDate').value||'2025-12-31'});
  goals.push({id:r.id,title,description:document.getElementById('gDesc').value,category:cat,icon:ICONS[cat]||'🎯',color:COLORS[cat]||'#3b82f6',target_date:document.getElementById('gDate').value||'2025-12-31',progress:0});
  closeModal('goalModal');renderGoals();toast('Goal created! 🎯','success');
  document.getElementById('gTitle').value='';document.getElementById('gDesc').value='';
}
async function updateProgress(id,delta){
  const g=goals.find(g=>g.id===id);if(!g)return;
  g.progress=Math.min(100,Math.max(0,g.progress+delta));
  await api('PATCH',`/api/goals/${id}/progress`,{progress:g.progress});
  renderGoals();if(g.progress===100)toast('🎉 Goal completed! Congratulations!','success');
}
async function deleteGoal(id){await api('DELETE',`/api/goals/${id}`);goals=goals.filter(g=>g.id!==id);renderGoals();toast('Goal deleted','info');}
async function getInsights(){
  toast('🤖 Analyzing goals with Gemini...','info');
  const r=await api('POST','/api/ai/chat',{message:`Analyze my ${goals.length} goals: ${goals.map(g=>g.title+' ('+g.progress+'%)').join(', ')}. Give 3 specific tips to make faster progress. Be concise.`});
  if(r.reply)toast(r.reply.substring(0,120)+'...','info');
}
function openModal(id){document.getElementById(id).classList.add('open');}
function closeModal(id){document.getElementById(id).classList.remove('open');}
async function api(m,u,b){const r=await fetch(u,{method:m,headers:{'Content-Type':'application/json'},body:b?JSON.stringify(b):undefined});return r.json();}
function toast(msg,type){const icons={success:'✅',error:'❌',info:'💡'};const c=document.getElementById('toast-container');const t=document.createElement('div');t.className=`toast ${type}`;t.innerHTML=`<span style="font-size:16px">${icons[type]||'💡'}</span><span>${msg}</span>`;c.appendChild(t);setTimeout(()=>{t.classList.add('out');setTimeout(()=>t.remove(),300);},3500);}
renderGoals();
</script>
{% endblock %}
