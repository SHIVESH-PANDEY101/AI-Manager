<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><title>Admin Users</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet">
<style>
:root{--bg:#04080f;--surface:#0b0f1f;--surf2:#0f1329;--surf3:#131828;--border:rgba(180,100,255,0.08);--border2:rgba(180,100,255,0.15);--accent:#8b5cf6;--a3:#10b981;--a4:#f59e0b;--a5:#ef4444;--text:#ede8ff;--text2:#7870a8;--text3:#3d3860;}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding:24px;}
.header{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;}
.back-btn{background:var(--surface);border:1px solid var(--border2);border-radius:10px;padding:8px 16px;color:var(--text);font-size:13px;cursor:pointer;text-decoration:none;transition:background .15s;}
.back-btn:hover{background:var(--surf2);}
.card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:20px;overflow-x:auto;}
.table{width:100%;border-collapse:collapse;font-size:13px;}
.table th{padding:10px 14px;text-align:left;font-size:11px;font-weight:700;color:var(--text3);letter-spacing:.8px;text-transform:uppercase;border-bottom:1px solid var(--border);}
.table td{padding:12px 14px;border-bottom:1px solid var(--border);color:var(--text2);}
.table tr:hover td{background:var(--surf2);}
.badge{font-size:10px;font-weight:700;padding:2px 8px;border-radius:20px;}
.b-p{background:rgba(139,92,246,.15);color:#8b5cf6;}.b-g{background:rgba(16,185,129,.15);color:#10b981;}.b-a{background:rgba(245,158,11,.15);color:#f59e0b;}.b-r{background:rgba(239,68,68,.15);color:#ef4444;}.b-gray{background:rgba(120,112,168,.15);color:#7870a8;}
.btn-sm{padding:5px 12px;border-radius:7px;font-size:12px;font-weight:600;cursor:pointer;border:1px solid var(--border2);background:var(--surf2);color:var(--text2);transition:all .15s;margin-right:4px;}
.btn-sm:hover{color:var(--text);}
.btn-sm.danger{background:rgba(239,68,68,.1);border-color:rgba(239,68,68,.2);color:var(--a5);}
.btn-sm.success{background:rgba(16,185,129,.1);border-color:rgba(16,185,129,.2);color:var(--a3);}
</style></head><body>
<div class="header">
  <a href="/admin" class="back-btn">← Admin Dashboard</a>
  <div style="font-family:'Syne',sans-serif;font-size:20px;font-weight:800;">All Users ({{ users|length }})</div>
</div>
<div class="card">
<table class="table">
<thead><tr><th>Name</th><th>Email</th><th>Role</th><th>Plan</th><th>Status</th><th>AI Calls</th><th>Joined</th><th>Actions</th></tr></thead>
<tbody>
{% for u in users %}
<tr>
  <td style="color:var(--text);font-weight:600;">{{ u.name }}</td>
  <td>{{ u.email }}</td>
  <td><span class="badge {{ 'b-p' if u.role=='admin' else 'b-gray' }}">{{ u.role.title() }}</span></td>
  <td><span class="badge {% if u.plan=='pro' %}b-a{% elif u.plan=='team' %}b-p{% else %}b-gray{% endif %}">{{ u.plan.title() }}</span></td>
  <td><span class="badge {{ 'b-g' if u.is_active else 'b-r' }}">{{ 'Active' if u.is_active else 'Suspended' }}</span></td>
  <td>{{ u.ai_calls_today }}</td>
  <td style="font-size:11px;">{{ u.created_at[:10] }}</td>
  <td>
    <form action="/api/admin/users/{{ u.id }}/plan" method="POST" style="display:inline">
      <select name="plan" style="background:var(--surf2);border:1px solid var(--border2);border-radius:6px;padding:4px 8px;font-size:11px;color:var(--text);margin-right:4px;">
        <option value="free" {{ 'selected' if u.plan=='free' }}>Free</option>
        <option value="pro" {{ 'selected' if u.plan=='pro' }}>Pro</option>
        <option value="team" {{ 'selected' if u.plan=='team' }}>Team</option>
      </select>
      <button class="btn-sm" type="submit">Set</button>
    </form>
    <button class="btn-sm {{ 'danger' if u.is_active else 'success' }}" onclick="toggleUser('{{ u.id }}', {{ u.is_active }})">
      {{ '🚫 Suspend' if u.is_active else '✅ Activate' }}
    </button>
  </td>
</tr>
{% endfor %}
</tbody>
</table>
</div>
<script>
async function toggleUser(id,active){
  await fetch(`/api/admin/users/${id}/toggle`,{method:'POST'});
  location.reload();
}
</script>
</body></html>
